<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Cloud Management Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            transition: all 0.3s ease;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }
        body.light-mode .stat-card,
        body.light-mode .chart-card,
        body.light-mode .form-card,
        body.light-mode .cloud-card {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: 1px solid #ddd;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
        h1 { font-size: 2em; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .theme-toggle { background: rgba(255,255,255,0.2); border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; color: white; font-size: 14px; }
        .search-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-input { flex: 2; padding: 12px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.2); color: white; font-size: 14px; }
        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .sort-select { flex: 1; padding: 12px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card h3 { font-size: 0.8em; color: #a0a0c0; margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .charts-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .chart-card h3 { margin-bottom: 15px; text-align: center; font-size: 1.1em; }
        canvas { max-height: 250px; width: 100%; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-add { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-export { background: #28a745; color: white; }
        .btn-export-pdf { background: #dc3545; color: white; }
        .btn-refresh { background: #ffc107; color: #333; }
        .btn-delete-all { background: #dc3545; color: white; }
        .form-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 15px; }
        input, select { padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,0.9); font-size: 13px; }
        .btn-submit { background: #28a745; color: white; padding: 10px 20px; }
        .clouds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .cloud-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 18px; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .cloud-card:hover { transform: translateY(-5px); }
        .cloud-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .cloud-name { font-size: 1.2em; font-weight: bold; }
        .provider-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; }
        .provider-AWS { background: #ff9900; color: #000; }
        .provider-Azure { background: #0078d4; color: #fff; }
        .provider-GCP { background: #4285f4; color: #fff; }
        .cloud-info { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; }
        .efficiency-badge { background: #ffc107; color: #333; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .status-running { color: #28a745; }
        .status-stopped { color: #dc3545; }
        .button-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
        .btn-start { background: #28a745; color: white; padding: 5px 10px; font-size: 11px; }
        .btn-stop { background: #dc3545; color: white; padding: 5px 10px; font-size: 11px; }
        .btn-storage { background: #17a2b8; color: white; padding: 5px 10px; font-size: 11px; }
        .btn-edit { background: #6c757d; color: white; padding: 5px 10px; font-size: 11px; }
        .btn-reset { background: #ffc107; color: #333; padding: 5px 10px; font-size: 11px; }
        .btn-delete { background: #dc3545; color: white; padding: 5px 10px; font-size: 11px; }
        .hidden { display: none !important; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-container {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        body.light-mode .modal-container {
            background: white;
            color: #333;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-x {
            background: #dc3545;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-x:hover {
            background: #c82333;
            transform: scale(1.1);
        }
        
        .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 12px 24px; border-radius: 8px; z-index: 10001; animation: fadeIn 0.3s; }
        .last-updated { text-align: right; font-size: 12px; margin-top: 20px; color: #a0a0c0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .charts-section { grid-template-columns: 1fr; } h1 { font-size: 1.5em; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cloud"></i> Multi-Cloud Dashboard</h1>
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> Dark/Light Mode</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3><i class="fas fa-dollar-sign"></i> Total Cost</h3><div class="stat-value" id="totalCost">$0</div></div>
            <div class="stat-card"><h3><i class="fas fa-database"></i> Total Storage</h3><div class="stat-value" id="totalStorage">0 GB</div></div>
            <div class="stat-card"><h3><i class="fas fa-play-circle"></i> Running</h3><div class="stat-value" id="runningCount">0</div></div>
            <div class="stat-card"><h3><i class="fas fa-stop-circle"></i> Stopped</h3><div class="stat-value" id="stoppedCount">0</div></div>
            <div class="stat-card"><h3><i class="fas fa-star"></i> Best Efficiency</h3><div class="stat-value" id="bestEfficiency">-</div></div>
        </div>

        <div class="charts-section">
            <div class="chart-card"><h3>💰 Cost Comparison</h3><canvas id="costChart"></canvas></div>
            <div class="chart-card"><h3>📊 VM Status Distribution</h3><canvas id="statusChart"></canvas></div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by name or provider..." onkeyup="filterClouds()">
            <select class="sort-select" id="sortSelect" onchange="sortClouds()">
                <option value="default">Sort by...</option>
                <option value="cost-asc">Cost: Low to High</option>
                <option value="cost-desc">Cost: High to Low</option>
                <option value="storage-asc">Storage: Low to High</option>
                <option value="storage-desc">Storage: High to Low</option>
                <option value="name-asc">Name: A to Z</option>
            </select>
        </div>

        <div class="action-buttons">
            <button class="btn-add" onclick="toggleForm()"><i class="fas fa-plus"></i> Add Cloud</button>
            <button class="btn-export" onclick="exportData()"><i class="fas fa-download"></i> Export CSV</button>
            <button class="btn-export-pdf" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
            <button class="btn-refresh" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="btn-delete-all" onclick="deleteAll()"><i class="fas fa-trash"></i> Delete All</button>
        </div>

        <div id="addForm" class="form-card hidden">
            <h3>Add New Cloud</h3>
            <div class="form-group">
                <input type="text" id="name" placeholder="Cloud Name">
                <input type="text" id="provider" placeholder="Provider (AWS/Azure/GCP)">
                <select id="status">
                    <option value="STOPPED">Stopped</option>
                    <option value="RUNNING">Running</option>
                </select>
                <input type="number" id="storage" placeholder="Storage (GB)">
                <input type="number" id="cost" placeholder="Cost ($)">
                <input type="text" id="region" placeholder="Region">
                <input type="text" id="instanceType" placeholder="Instance Type">
                <input type="number" id="cpuCores" placeholder="CPU Cores">
                <input type="number" id="ramGb" placeholder="RAM (GB)">
                <select id="environment"><option value="production">Production</option><option value="development">Development</option><option value="staging">Staging</option></select>
            </div>
            <button class="btn-submit" onclick="addCloud()"><i class="fas fa-save"></i> Save Cloud</button>
        </div>

        <div id="loadingSpinner" class="hidden" style="text-align:center; padding:50px">
            <div class="loading-spinner"></div>
            <p>Loading clouds...</p>
        </div>

        <div class="clouds-grid" id="cloudsGrid">
            <div style="text-align:center; padding:50px">Loading clouds...</div>
        </div>

        <div class="last-updated" id="lastUpdated">Last updated: --:--:--</div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius:20px; padding:30px; max-width:500px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3><i class="fas fa-edit"></i> Edit Cloud</h3>
                <button onclick="closeEditModal()" style="background:#dc3545; border:none; font-size:18px; cursor:pointer; color:white; width:32px; height:32px; border-radius:50%;">✕</button>
            </div>
            <div class="form-group">
                <input type="text" id="edit_name" placeholder="Cloud Name">
                <input type="text" id="edit_provider" placeholder="Provider">
                <select id="edit_status">
                    <option value="STOPPED">Stopped</option>
                    <option value="RUNNING">Running</option>
                </select>
                <input type="number" id="edit_storage" placeholder="Storage (GB)">
                <input type="number" id="edit_cost" placeholder="Cost ($)">
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-add" onclick="saveEdit()">Save Changes</button>
                <button class="btn-refresh" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/clouds';
        let allClouds = [];
        let filteredClouds = [];
        let costChart = null;
        let statusChart = null;
        let currentEditId = null;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            showToast('Theme changed!');
        }

        function filterClouds() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filteredClouds = allClouds.filter(cloud => 
                cloud.name.toLowerCase().includes(searchTerm) || 
                cloud.provider.toLowerCase().includes(searchTerm)
            );
            sortClouds();
        }

        function sortClouds() {
            const sortBy = document.getElementById('sortSelect').value;
            switch(sortBy) {
                case 'cost-asc': filteredClouds.sort((a,b) => a.cost - b.cost); break;
                case 'cost-desc': filteredClouds.sort((a,b) => b.cost - a.cost); break;
                case 'storage-asc': filteredClouds.sort((a,b) => a.storageGb - b.storageGb); break;
                case 'storage-desc': filteredClouds.sort((a,b) => b.storageGb - a.storageGb); break;
                case 'name-asc': filteredClouds.sort((a,b) => a.name.localeCompare(b.name)); break;
                default: filteredClouds = [...allClouds];
            }
            displayClouds(filteredClouds);
        }

        async function fetchClouds() {
            document.getElementById('loadingSpinner').classList.remove('hidden');
            document.getElementById('cloudsGrid').classList.add('hidden');
            try {
                const response = await fetch(API_URL);
                allClouds = await response.json();
                filteredClouds = [...allClouds];
                displayClouds(filteredClouds);
                updateCharts(allClouds);
                fetchAnalytics();
                updateStatusSummary(allClouds);
                updateEfficiencyRating(allClouds);
            } catch (error) {
                document.getElementById('cloudsGrid').innerHTML = '<div style="text-align:center; padding:50px">❌ Error connecting to server</div>';
            }
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('cloudsGrid').classList.remove('hidden');
            updateLastUpdated();
        }

        function updateLastUpdated() {
            const now = new Date();
            document.getElementById('lastUpdated').innerHTML = `Last updated: ${now.toLocaleTimeString()}`;
        }

        // FIXED: Status count with UPPERCASE
        function updateStatusSummary(clouds) {
            const running = clouds.filter(c => c.vmStatus === 'RUNNING').length;
            const stopped = clouds.filter(c => c.vmStatus === 'STOPPED').length;
            document.getElementById('runningCount').innerHTML = running;
            document.getElementById('stoppedCount').innerHTML = stopped;
        }

        function updateEfficiencyRating(clouds) {
            if (clouds.length === 0) return;
            let bestEfficiency = null, bestScore = 0;
            clouds.forEach(cloud => {
                const score = cloud.storageGb / (cloud.cost + 0.01);
                if (score > bestScore) { bestScore = score; bestEfficiency = cloud.name; }
            });
            document.getElementById('bestEfficiency').innerHTML = bestEfficiency || '-';
        }

        async function fetchAnalytics() {
            try {
                const response = await fetch(API_URL + '/analytics');
                const data = await response.json();
                document.getElementById('totalCost').innerHTML = '$' + (data.totalCost?.toFixed(2) || 0);
                document.getElementById('totalStorage').innerHTML = (data.totalStorage || 0) + ' GB';
            } catch (error) {}
        }

        // FIXED: displayClouds function with proper status handling
        function displayClouds(clouds) {
            const grid = document.getElementById('cloudsGrid');

            if (!clouds || clouds.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:50px">No clouds found</div>';
                return;
            }

            grid.innerHTML = clouds.map(cloud => {
                const efficiency = (cloud.storageGb / (cloud.cost + 0.01)).toFixed(1);

                return `<div class="cloud-card">
                    <div class="cloud-header">
                        <span class="cloud-name"><i class="fas fa-cloud"></i> ${cloud.name}</span>
                        <span class="provider-badge provider-${cloud.provider}">${cloud.provider}</span>
                    </div>

                    <div class="cloud-info">
                        <span>Status</span>
                        <span class="status-${cloud.vmStatus.toLowerCase()}">${cloud.vmStatus}</span>
                    </div>

                    <div class="cloud-info">
                        <span>Storage</span>
                        <span>${cloud.storageGb} GB</span>
                    </div>

                    <div class="cloud-info">
                        <span>Cost</span>
                        <span>$${cloud.cost}</span>
                    </div>

                    <div class="cloud-info">
                        <span>Efficiency</span>
                        <span class="efficiency-badge">${efficiency} GB/$</span>
                    </div>

                    <div class="button-group">
                        ${cloud.vmStatus === 'STOPPED'
                            ? `<button class="btn-start" onclick="startVM('${cloud.id}')">Start</button>`
                            : `<button class="btn-stop" onclick="stopVM('${cloud.id}')">Stop</button>`
                        }
                        <button class="btn-storage" onclick="addStorage('${cloud.id}')">+ Storage</button>
                        <button class="btn-edit" onclick="openEditModal('${cloud.id}')">Edit</button>
                        <button class="btn-reset" onclick="if(confirm('Reset this cloud?')) fetch('${API_URL}/${cloud.id}/reset',{method:'PUT'}).then(()=>fetchClouds())">Reset</button>
                        <button class="btn-delete" onclick="if(confirm('Delete this cloud?')) fetch('${API_URL}/${cloud.id}',{method:'DELETE'}).then(()=>fetchClouds())">Delete</button>
                    </div>
                </div>`;
            }).join('');
        }

        // FIXED: updateCharts with UPPERCASE status
        function updateCharts(clouds) {
            if (!clouds || clouds.length === 0) return;
            const names = clouds.map(c => c.name);
            const costs = clouds.map(c => c.cost);
            const running = clouds.filter(c => c.vmStatus === 'RUNNING').length;
            const stopped = clouds.filter(c => c.vmStatus === 'STOPPED').length;
            const costCtx = document.getElementById('costChart').getContext('2d');
            if (costChart) costChart.destroy();
            costChart = new Chart(costCtx, { type: 'bar', data: { labels: names, datasets: [{ label: 'Cost ($)', data: costs, backgroundColor: 'rgba(102, 126, 234, 0.8)' }] }, options: { responsive: true } });
            const statusCtx = document.getElementById('statusChart').getContext('2d');
            if (statusChart) statusChart.destroy();
            statusChart = new Chart(statusCtx, { type: 'pie', data: { labels: ['Running', 'Stopped'], datasets: [{ data: [running, stopped], backgroundColor: ['#28a745', '#dc3545'] }] }, options: { responsive: true } });
        }

        async function startVM(id) { await fetch(`${API_URL}/${id}/start`, { method: 'PUT' }); showToast('VM Started!'); fetchClouds(); }
        async function stopVM(id) { await fetch(`${API_URL}/${id}/stop`, { method: 'PUT' }); showToast('VM Stopped!'); fetchClouds(); }
        async function addStorage(id) { const gb = prompt('Enter storage to add (GB):', '100'); if (gb) { await fetch(`${API_URL}/${id}/storage/${gb}`, { method: 'PUT' }); showToast(`Added ${gb} GB!`); fetchClouds(); } }

        async function addCloud() {
            const cloud = {
                name: document.getElementById('name').value,
                provider: document.getElementById('provider').value,
                vmStatus: document.getElementById('status').value,
                storageGb: parseInt(document.getElementById('storage').value) || 0,
                cost: parseFloat(document.getElementById('cost').value) || 0,
                region: document.getElementById('region').value,
                instanceType: document.getElementById('instanceType').value,
                cpuCores: parseInt(document.getElementById('cpuCores').value) || 0,
                ramGb: parseInt(document.getElementById('ramGb').value) || 0,
                environment: document.getElementById('environment').value
            };
            if (!cloud.name || !cloud.provider) { alert('Please fill Name and Provider!'); return; }
            await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cloud) });
            showToast('Cloud Added!');
            toggleForm();
            fetchClouds();
        }

        // OPEN EDIT MODAL
        function openEditModal(id) {
            fetch(`${API_URL}/${id}`).then(res => res.json()).then(cloud => {
                currentEditId = id;
                document.getElementById('edit_name').value = cloud.name;
                document.getElementById('edit_provider').value = cloud.provider;
                document.getElementById('edit_status').value = cloud.vmStatus;
                document.getElementById('edit_storage').value = cloud.storageGb;
                document.getElementById('edit_cost').value = cloud.cost;
                const modal = document.getElementById('editModal');
                modal.style.display = 'flex';
            });
        }

        // CLOSE EDIT MODAL
        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.style.display = 'none';
            currentEditId = null;
        }

        async function saveEdit() {
            if (!currentEditId) return;
            const cloud = {
                name: document.getElementById('edit_name').value,
                provider: document.getElementById('edit_provider').value,
                vmStatus: document.getElementById('edit_status').value,
                storageGb: parseInt(document.getElementById('edit_storage').value) || 0,
                cost: parseFloat(document.getElementById('edit_cost').value) || 0
            };
            await fetch(`${API_URL}/${currentEditId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cloud) });
            showToast('Cloud Updated!');
            closeEditModal();
            fetchClouds();
        }

        async function exportToPDF() {
            const element = document.querySelector('.container');
            html2pdf().set({ margin: 10, filename: 'cloud-dashboard-report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
            showToast('PDF Downloaded!');
        }

        function exportData() { window.open(`${API_URL}/export`, '_blank'); showToast('Downloading CSV...'); }
        async function deleteAll() { if (confirm('DELETE ALL CLOUDS?')) { await fetch(`${API_URL}/all`, { method: 'DELETE' }); showToast('All Deleted!'); fetchClouds(); } }
        function refreshData() { fetchClouds(); showToast('Refreshing...'); }
        function toggleForm() { document.getElementById('addForm').classList.toggle('hidden'); }
        function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = '<i class="fas fa-check-circle"></i> ' + message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

        setInterval(fetchClouds, 30000);
        fetchClouds();
    </script>
</body>
</html>
